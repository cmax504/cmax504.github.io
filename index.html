<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Humanist's Toolkit</title>
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic" crossorigin>
<link href="https://googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
    /* Refined Dark Mode Palette */
    --primary-dark: #0f172a;
    --primary-light: #1e293b;
    --accent-color: #38bdf8;
    --accent-hover: #0ea5e9;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --stop-color: #ef4444;
    --border-color: #334155;
    --font-heading: 'Playfair Display', serif;
    --font-body: 'Lato', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body { font-family: var(--font-body); background-color: var(--primary-dark); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

/* --- NAVIGATION --- */
.navbar { background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); position: fixed; top: 0; width: 100%; z-index: 1000; padding: 1rem 0; border-bottom: 1px solid var(--border-color); }
.nav-container { display: flex; justify-content: center; list-style: none; gap: 2rem; }
.nav-item a { color: var(--text-muted); text-decoration: none; font-weight: 700; padding: 5px 15px; border-radius: 6px; transition: all 0.3s; cursor: pointer; }
.nav-item a:hover, .nav-item a.active { color: var(--accent-color); background: rgba(56, 189, 248, 0.1); }

/* --- UNIFIED BUTTONS (With Diagonal Gradient) --- */
.btn { 
    position: relative; padding: 0.8rem 1.5rem; background: var(--primary-light); color: var(--text-main); 
    border: 1px solid var(--border-color); border-radius: 8px; font-weight: 700; cursor: pointer; 
    overflow: hidden; transition: transform 0.2s, border-color 0.3s; display: inline-flex; align-items: center; justify-content: center;
}
.btn::before {
    content: ''; position: absolute; top: -50%; left: -150%; width: 200%; height: 200%;
    background: linear-gradient(115deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: 0.6s; transform: rotate(25deg);
}
.btn:hover { border-color: var(--accent-color); transform: translateY(-2px); }
.btn:hover::before { left: 100%; }

/* --- HERO SECTION --- */
.hero-parallax {
    height: 85vh; display: flex; align-items: center; justify-content: center; text-align: center;
    background: linear-gradient(rgba(15, 23, 42, 0.8), var(--primary-dark)), 
                url('https://unsplash.com');
    background-size: cover; background-position: center;
}
.hero-title { font-family: var(--font-heading); font-size: 4.5rem; margin-bottom: 1rem; color: var(--text-main); }
.hero-description { font-size: 1.3rem; color: var(--text-muted); max-width: 700px; margin: 0 auto; }

/* --- CONTENT AREAS --- */
.page-content { display: none; padding-top: 120px; min-height: 100vh; }
.content-container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

/* Forms & Inputs */
.lesson-form label { color: var(--accent-color); font-weight: 700; margin-bottom: 0.5rem; display: block; text-transform: uppercase; font-size: 0.8rem; }
input, textarea { 
    width: 100%; padding: 1rem; background: #0f172a; border: 1px solid var(--border-color); 
    border-radius: 8px; color: var(--text-main); font-family: var(--font-body); margin-bottom: 1.5rem;
}
input:focus, textarea:focus { outline: none; border-color: var(--accent-color); }

.activity-item { background: #1e293b; border-left: 4px solid var(--accent-color); padding: 1.5rem; margin-bottom: 1.5rem; border-radius: 8px; position: relative; }

/* --- TEACH MODE OVERLAY --- */
.teach-view { 
    display: none; position: fixed; inset: 0; background: var(--primary-dark); z-index: 2000; padding-top: 20px;
}
.teach-view-container { display: flex; height: 100%; }
.time-controls-container { width: 120px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 2rem 0; gap: 2rem; }
#teach-time-display { font-size: 1.4rem; font-weight: 700; color: var(--accent-color); }
.progress-bar-container { width: 10px; height: 300px; background: #334155; border-radius: 5px; position: relative; overflow: hidden; }
.progress-bar-fill { position: absolute; bottom: 0; width: 100%; background: var(--accent-color); transition: height 0.3s; }

.activity-display-item { padding: 2rem; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 1.5rem; opacity: 0.3; transition: 0.4s; }
.activity-display-item.is-active-parent { opacity: 1; border-color: var(--accent-color); background: rgba(56, 189, 248, 0.05); }

/* Library Styles */
.folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 2rem; }
.folder-item { text-align: center; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
.folder-item:hover { color: var(--accent-color); transform: translateY(-5px); }
.folder-item .icon { font-size: 3.5rem; }

.lesson-list-item { background: var(--primary-light); padding: 1.5rem; border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }

</style>
</head>
<body>

<nav class="navbar">
    <ul class="nav-container">
        <li class="nav-item"><a class="nav-link active" data-page="home">Home</a></li>
        <li class="nav-item"><a class="nav-link" data-page="lesson-planner">Planner</a></li>
        <li class="nav-item"><a class="nav-link" data-page="my-lessons">Library</a></li>
    </ul>
</nav>

<main id="home" class="page-content" style="display: block;">
    <header class="hero-parallax">
        <div class="hero-content">
            <h1 class="hero-title">The Humanist's Toolkit</h1>
            <p class="hero-description">A sophisticated digital environment for educators. Organize your research, structure your time, and teach with focus.</p>
        </div>
    </header>
</main>

<main id="lesson-planner" class="page-content">
    <div class="content-container">
        <form class="lesson-form">
            <div style="display:flex; justify-content: space-between; margin-bottom: 2rem;">
                <h1 style="font-family: var(--font-heading);">Lesson Planner</h1>
                <div id="total-time-display" style="color: var(--accent-color); font-weight: 700;">0 Minutes</div>
            </div>
            <label>Course Name</label><input type="text" id="course-name">
            <label>Unit Name</label><input type="text" id="unit-name">
            <label>Learning Goals</label><textarea id="learning-goals"></textarea>
            
            <h2 style="margin: 2rem 0 1rem; color: var(--accent-color);">Activities</h2>
            <div id="activities-container"></div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="button" class="btn" id="add-activity-btn">+ Add Activity</button>
                <button type="button" class="btn" id="save-lesson-btn">Save Lesson</button>
                <button type="button" class="btn" id="teach-lesson-btn">► Start Teaching</button>
            </div>
        </form>
    </div>
</main>

<main id="my-lessons" class="page-content">
    <div class="content-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <nav id="breadcrumb-nav" style="font-size: 1.5rem; color: var(--accent-color); font-family: var(--font-heading);"></nav>
            <div style="display: flex; gap: 1rem;">
                <button class="btn" id="upload-lessons-btn">Upload</button>
                <button class="btn" id="download-lessons-btn">Download</button>
                <button class="btn" id="create-folder-btn">New Folder</button>
            </div>
        </div>
        <div style="display:flex; gap: 2rem;">
            <div id="folder-list" style="width: 250px;"></div>
            <div id="lesson-list" style="flex-grow: 1;"></div>
        </div>
        <input type="file" id="upload-input" accept=".json" style="display: none;">
    </div>
</main>

<!-- TEACH OVERLAY -->
<div class="teach-view" id="teach-view-overlay">
    <div class="teach-view-container">
        <div class="time-controls-container">
            <p id="teach-time-display">00:00</p>
            <button class="btn" id="play-pause-btn" style="font-size: 1.5rem;">▶</button>
            <div class="progress-bar-container"><div class="progress-bar-fill" id="time-bar-fill"></div></div>
            <div style="font-size: 0.7rem; color: var(--text-muted); padding: 0 10px;">
                <label><input type="radio" name="timer-mode" value="stopwatch" checked> Stop</label>
                <label><input type="radio" name="timer-mode" value="timer"> Timer</label>
                <label><input type="checkbox" id="kinetic-numbers-toggle"> Kinetic</label>
            </div>
        </div>
        <div style="flex: 1; padding: 3rem; overflow-y: auto;" id="teach-activities-scroller"></div>
        <div style="width: 350px; padding: 3rem; background: #1e293b; border-left: 1px solid var(--border-color);" id="teach-context-panel"></div>
    </div>
    <button class="btn" id="stop-teaching-btn" style="position: fixed; bottom: 2rem; right: 2rem; background: var(--stop-color);">⏹ Stop Session</button>
</div>

<script>
// --- CORE LOGIC RESTORED FROM ORIGINAL PDF ---
let currentFolderId = 'root';
const navLinks = document.querySelectorAll('.nav-link');
const pages = document.querySelectorAll('.page-content');

const navigateToPage = (pageId) => {
    pages.forEach(p => p.style.display = 'none');
    document.getElementById(pageId).style.display = 'block';
    navLinks.forEach(l => l.classList.toggle('active', l.dataset.page === pageId));
    if (pageId === 'my-lessons') renderMyLessons();
};

navLinks.forEach(link => link.onclick = () => navigateToPage(link.dataset.page));

// Activities Logic
const activitiesContainer = document.getElementById('activities-container');
document.getElementById('add-activity-btn').onclick = () => {
    const div = document.createElement('div');
    div.className = 'activity-item';
    div.innerHTML = `
        <div style="display:flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 2;"><label>Activity Name</label><input type="text" class="act-name"></div>
            <div style="flex: 1;"><label>Minutes</label><input type="number" class="act-mins" value="0"></div>
        </div>
        <label>Notes</label><textarea class="act-notes"></textarea>
        <button type="button" style="position:absolute; top:10px; right:10px; background:none; border:none; color:var(--stop-color); cursor:pointer; font-size:1.5rem;" onclick="this.parentElement.remove(); updateTime();">×</button>
    `;
    activitiesContainer.appendChild(div);
    div.querySelector('.act-mins').oninput = updateTime;
};

function updateTime() {
    let total = 0;
    document.querySelectorAll('.act-mins').forEach(i => total += parseInt(i.value) || 0);
    document.getElementById('total-time-display').innerText = total + " Minutes";
}

// --- TEACH MODE LOGIC (State-Safe Fix) ---
let teachTimer = null;
let secondsElapsed = 0;
let totalLessonSeconds = 0;
let isPaused = true;
let sessionActivities = [];

document.getElementById('teach-lesson-btn').onclick = () => {
    sessionActivities = Array.from(document.querySelectorAll('.activity-item')).map((el, i) => {
        const m = parseInt(el.querySelector('.act-mins').value) || 0;
        return { name: el.querySelector('.act-name').value || `Activity ${i+1}`, mins: m, notes: el.querySelector('.act-notes').value, start: 0, end: 0 };
    });
    
    let cum = 0;
    sessionActivities.forEach(a => { a.start = cum; cum += a.mins * 60; a.end = cum; });
    totalLessonSeconds = cum;
    secondsElapsed = 0;
    
    document.getElementById('teach-view-overlay').style.display = 'block';
    renderTeachUI();
};

function renderTeachUI() {
    const mode = document.querySelector('input[name="timer-mode"]:checked').value;
    const kinetic = document.getElementById('kinetic-numbers-toggle').checked;
    const display = document.getElementById('teach-time-display');
    const scroller = document.getElementById('teach-activities-scroller');
    
    // Timer Display
    let timeToShow = (mode === 'timer') ? Math.max(0, totalLessonSeconds - secondsElapsed) : secondsElapsed;
    const m = Math.floor(timeToShow / 60);
    const s = timeToShow % 60;
    display.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    
    // Progress Fill
    document.getElementById('time-bar-fill').style.height = (secondsElapsed / totalLessonSeconds * 100) + "%";

    // Activity Cards
    scroller.innerHTML = sessionActivities.map((a, i) => {
        const active = secondsElapsed >= a.start && secondsElapsed < a.end;
        return `<div class="activity-display-item ${active ? 'is-active-parent' : ''}">
            <h3 style="color:var(--accent-color)">${a.name}</h3>
            <p style="color:var(--text-muted); margin-top:1rem;">${a.notes}</p>
        </div>`;
    }).join('');
}

// THE FIX: Settings listeners only call render, not reset!
document.querySelectorAll('input[name="timer-mode"], #kinetic-numbers-toggle').forEach(el => {
    el.onchange = renderTeachUI;
});

document.getElementById('play-pause-btn').onclick = function() {
    isPaused = !isPaused;
    this.innerText = isPaused ? '▶' : '⏸';
    if (!isPaused) {
        teachTimer = setInterval(() => {
            if (secondsElapsed < totalLessonSeconds) { secondsElapsed++; renderTeachUI(); }
            else { clearInterval(teachTimer); isPaused = true; }
        }, 1000);
    } else clearInterval(teachTimer);
};

document.getElementById('stop-teaching-btn').onclick = () => {
    clearInterval(teachTimer);
    document.getElementById('teach-view-overlay').style.display = 'none';
};

// --- RESTORED LIBRARY DATA LOGIC ---
const getData = () => JSON.parse(localStorage.getItem('humanistToolkitData')) || { lessons: {}, folders: {} };
const saveData = (d) => localStorage.setItem('humanistToolkitData', JSON.stringify(d));

function renderMyLessons() {
    const d = getData();
    const fList = document.getElementById('folder-list');
    const lList = document.getElementById('lesson-list');
    
    fList.innerHTML = `<div class="folder-grid">` + Object.values(d.folders).filter(f => f.parentId === currentFolderId).map(f => `
        <div class="folder-item" onclick="currentFolderId='${f.id}'; renderMyLessons();">
            <div class="icon">📁</div><div class="name">${f.name}</div>
        </div>`).join('') + `</div>`;

    lList.innerHTML = Object.entries(d.lessons).filter(([n, l]) => l.folderId === currentFolderId).map(([name, l]) => `
        <div class="lesson-list-item">
            <h3>${name}</h3>
            <button class="btn" onclick="loadLesson('${name}')">Open</button>
        </div>`).join('');
}

document.getElementById('save-lesson-btn').onclick = () => {
    const name = prompt("Lesson Name?");
    if (!name) return;
    const d = getData();
    d.lessons[name] = { 
        folderId: currentFolderId,
        course: document.getElementById('course-name').value,
        unit: document.getElementById('unit-name').value,
        goals: document.getElementById('learning-goals').value,
        activities: Array.from(document.querySelectorAll('.activity-item')).map(el => ({
            name: el.querySelector('.act-name').value, mins: el.querySelector('.act-mins').value, notes: el.querySelector('.act-notes').value
        }))
    };
    saveData(d);
    alert("Saved!");
};

function loadLesson(name) {
    const l = getData().lessons[name];
    document.getElementById('course-name').value = l.course;
    document.getElementById('unit-name').value = l.unit;
    document.getElementById('learning-goals').value = l.goals;
    activitiesContainer.innerHTML = '';
    l.activities.forEach(a => {
        document.getElementById('add-activity-btn').click();
        const last = activitiesContainer.lastElementChild;
        last.querySelector('.act-name').value = a.name;
        last.querySelector('.act-mins').value = a.mins;
        last.querySelector('.act-notes').value = a.notes;
    });
    updateTime();
    navigateToPage('lesson-planner');
}

document.getElementById('create-folder-btn').onclick = () => {
    const n = prompt("Folder Name?");
    if (!n) return;
    const d = getData();
    const id = 'f' + Date.now();
    d.folders[id] = { id, name: n, parentId: currentFolderId };
    saveData(d); renderMyLessons();
};

document.getElementById('download-lessons-btn').onclick = () => {
    const blob = new Blob([localStorage.getItem('humanistToolkitData')], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'toolkit_backup.json'; a.click();
};

document.getElementById('upload-lessons-btn').onclick = () => document.getElementById('upload-input').click();
document.getElementById('upload-input').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { saveData(JSON.parse(ev.target.result)); renderMyLessons(); alert("Merged!"); };
    reader.readAsText(e.target.files[0]);
};
</script>
</body>
</html>
